<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复盘优化 - 有限空间作业安全风险动态管控平台</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .review-layout {
            display: flex;
            gap: 20px;
            height: calc(100vh - 120px);
        }
        .review-left {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .review-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .filter-section {
            background-color: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        .filter-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
        }
        .filter-group {
            margin-bottom: 12px;
        }
        .filter-group:last-child {
            margin-bottom: 0;
        }
        .filter-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 6px;
            display: block;
        }
        .job-list-section {
            flex: 1;
            background-color: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .job-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .job-list-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .job-list-count {
            font-size: 12px;
            color: var(--text-light);
        }
        .job-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        .job-list::-webkit-scrollbar {
            width: 4px;
        }
        .job-list::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 2px;
        }
        .job-item {
            padding: 12px;
            background-color: #fafafa;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .job-item:hover {
            border-color: var(--primary-color);
        }
        .job-item.active {
            border-color: var(--primary-color);
            background-color: rgba(26, 54, 93, 0.05);
        }
        .job-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .job-item-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-color);
        }
        .job-item-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
        }
        .job-item-meta {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text-light);
        }
        .detail-section {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-color);
        }
        .detail-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        .detail-info:last-child {
            margin-bottom: 0;
        }
        .detail-info-item {
            padding: 12px;
            background-color: #fafafa;
            border-radius: 6px;
        }
        .detail-info-label {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .detail-info-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
        }
        .review-form-section {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .form-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 16px;
        }
        .review-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group-full {
            margin-bottom: 16px;
        }
        .form-actions-bottom {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1500;
            align-items: center;
            justify-content: center;
        }
        .modal-container {
            background-color: white;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .modal-close:hover {
            background-color: #f5f5f5;
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .report-section {
            margin-bottom: 24px;
        }
        .report-section:last-child {
            margin-bottom: 0;
        }
        .report-section-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .report-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .report-info-item {
            display: flex;
            gap: 8px;
        }
        .report-info-label {
            font-size: 13px;
            color: var(--text-light);
            min-width: 80px;
        }
        .report-info-value {
            font-size: 13px;
            color: var(--text-color);
        }
        .report-text-content {
            font-size: 13px;
            color: var(--text-color);
            line-height: 1.6;
            white-space: pre-wrap;
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
        }
        .success-message {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background-color: rgba(56, 161, 105, 0.1);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .success-message svg {
            width: 20px;
            height: 20px;
            stroke: var(--success-color);
        }
        .success-message span {
            font-size: 14px;
            color: var(--success-color);
            font-weight: 500;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-light);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            stroke: #ccc;
            margin-bottom: 12px;
        }
        .empty-state span {
            font-size: 13px;
        }
        @media (max-width: 1200px) {
            .review-layout {
                flex-direction: column;
                height: auto;
            }
            .review-left {
                width: 100%;
            }
            .detail-info {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

        <main class="main-content" style="margin-right: 0;">
            <div class="page-header">
                <h2 class="page-title">作业后复盘优化</h2>
            </div>

            <div class="review-layout">
                <div class="review-left">
                    <div class="filter-section">
                        <h4 class="filter-title">查询条件</h4>
                        <div class="filter-group">
                            <label class="filter-label">开始日期</label>
                            <input type="date" class="form-input" id="filterStartDate" style="padding: 8px 12px; font-size: 12px;">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">结束日期</label>
                            <input type="date" class="form-input" id="filterEndDate" style="padding: 8px 12px; font-size: 12px;">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">作业地点</label>
                            <select class="form-select" id="filterLocation" style="padding: 8px 12px; font-size: 12px;">
                                <option value="">全部</option>
                                <option value="储罐区A">储罐区A</option>
                                <option value="储罐区B">储罐区B</option>
                                <option value="管道区">管道区</option>
                                <option value="设备区">设备区</option>
                                <option value="通风机房">通风机房</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">作业类型</label>
                            <select class="form-select" id="filterType" style="padding: 8px 12px; font-size: 12px;">

                                <option value="清理作业">清理作业</option>
                                <option value="检修作业">检修作业</option>
                                <option value="检测作业">检测作业</option>
                                <option value="维护作业">维护作业</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">作业状态</label>
                            <select class="form-select" id="filterStatus" style="padding: 8px 12px; font-size: 12px;">
                                <option value="">全部</option>
                                <option value="已完成">已完成</option>
                                <option value="待复盘">待复盘</option>
                            </select>
                        </div>
                        <button class="btn primary" style="width: 100%; margin-top: 8px;" onclick="searchJobs()">查询</button>
                    </div>

                    <div class="job-list-section">
                        <div class="job-list-header">
                            <h4 class="job-list-title">作业记录表</h4>
                            <span class="job-list-count" id="jobCount">共 0 条记录</span>
                        </div>
                        <div class="job-list" id="jobList">
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    </svg>
                    打印PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        var allJobs = [
            { id: 1, name: '3号储罐清理作业', date: '2024-01-15', location: '储罐区A', type: '清理作业', status: '已完成',

              risks: '缺氧窒息、有毒气体、触电、迷路', measures: '1. 入口气体检测合格方可进入\n2. 佩戴便携式气体检测仪\n3. 携带对讲机保持通讯\n4. 沿途做好标记' }

        var currentJob = null;
        var filteredJobs = [];

        document.addEventListener('DOMContentLoaded', function() {
            initDateFilters();
            loadAllJobs();
        });

        function initDateFilters() {
            var today = new Date();
            var weekAgo = new Date(today.getTime() - 10 * 24 * 60 * 60 * 1000);
            
            document.getElementById('filterStartDate').value = formatDate(weekAgo);
            document.getElementById('filterEndDate').value = formatDate(today);
        }

        function loadAllJobs() {
            filteredJobs = allJobs.slice();
            renderJobList();
        }

        function formatDate(date) {
            var year = date.getFullYear();
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        }

        function searchJobs() {
            var startDate = document.getElementById('filterStartDate').value;
            var endDate = document.getElementById('filterEndDate').value;
            var location = document.getElementById('filterLocation').value;
            var type = document.getElementById('filterType').value;
            var status = document.getElementById('filterStatus').value;
            
            filteredJobs = allJobs.filter(function(job) {
                if (startDate && job.date < startDate) return false;
                if (endDate && job.date > endDate) return false;
                if (location && job.location !== location) return false;
                if (type && job.type !== type) return false;
                if (status && job.status !== status) return false;
                return true;
            });
            
            renderJobList();
            clearDetail();
            clearReviewForm();
        }

        function renderJobList() {
            var listEl = document.getElementById('jobList');
            var countEl = document.getElementById('jobCount');
            
            countEl.textContent = '共 ' + filteredJobs.length + ' 条记录';
            
            if (filteredJobs.length === 0) {
                listEl.innerHTML = '<div class="empty-state">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                    '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
                    '<polyline points="14 2 14 8 20 8"/>' +
                    '</svg>' +
                    '<span>未找到符合条件的记录</span>' +
                    '</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < filteredJobs.length; i++) {
                var job = filteredJobs[i];
                var statusClass = job.status === '已完成' ? 'success' : 'warning';
                html += '<div class="job-item" onclick="selectJob(' + job.id + ')" data-id="' + job.id + '">' +
                    '<div class="job-item-header">' +
                    '<span class="job-item-name">' + job.name + '</span>' +
                    '<span class="job-item-status status-tag ' + statusClass + '">' + job.status + '</span>' +
                    '</div>' +
                    '<div class="job-item-meta">' +
                    '<span>' + job.date + '</span>' +
                    '<span>' + job.location + '</span>' +
                    '<span>' + job.type + '</span>' +
                    '</div>' +
                    '</div>';
            }
            listEl.innerHTML = html;
        }

        function selectJob(id) {
            var items = document.querySelectorAll('.job-item');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
                if (items[i].getAttribute('data-id') == id) {
                    items[i].classList.add('active');
                }
            }
            
            for (var i = 0; i < filteredJobs.length; i++) {
                if (filteredJobs[i].id === id) {
                    currentJob = filteredJobs[i];
                    break;
                }
            }
            
            if (currentJob) {
                renderDetail(currentJob);
                clearReviewForm();
            }
        }

        function renderDetail(job) {
            var content = document.getElementById('detailContent');
            var statusClass = job.status === '已完成' ? 'success' : 'warning';
            var alertColor = job.alertCount > 0 ? 'var(--warning-color)' : 'var(--success-color)';
            
            content.innerHTML = 
                '<div class="detail-info">' +
                '<div class="detail-info-item"><div class="detail-info-label">作业名称</div><div class="detail-info-value">' + job.name + '</div></div>' +
                '<div class="detail-info-item"><div class="detail-info-label">作业地点</div><div class="detail-info-value">' + job.location + '</div></div>' +
                '<div class="detail-info-item"><div class="detail-info-label">作业时间</div><div class="detail-info-value">' + job.date + ' ' + job.startTime + '-' + job.endTime + '</div></div>' +

                '<div class="detail-info-item"><div class="detail-info-label">作业状态</div><div class="detail-info-value"><span class="status-tag ' + statusClass + '">' + job.status + '</span></div></div>' +

                '<div class="detail-info-item" style="grid-column: span 2;"><div class="detail-info-label">作业内容</div><div class="detail-info-value">' + job.description + '</div></div>' +
                '<div class="detail-info-item" style="grid-column: span 2;"><div class="detail-info-label">主要风险</div><div class="detail-info-value">' + job.risks + '</div></div>' +

                '<div class="detail-info-item" style="grid-column: span 4;"><div class="detail-info-label">安全措施</div><div class="detail-info-value" style="white-space: pre-wrap;">' + job.measures + '</div></div>' +
                '</div>';
        }

        function clearDetail() {
            currentJob = null;
            document.getElementById('detailContent').innerHTML = 
                '<div class="empty-state">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                '<circle cx="12" cy="12" r="10"/>' +
                '<line x1="12" y1="16" x2="12" y2="12"/>' +
                '<line x1="12" y1="8" x2="12.01" y2="8"/>' +
                '</svg>' +
                '<span>请从左侧选择一条作业记录</span>' +
                '</div>';
        }

        function clearReviewForm() {
            document.getElementById('reviewProblems').value = '';
            document.getElementById('reviewMeasures').value = '';
            document.getElementById('reviewSummary').value = '';
            document.getElementById('reviewPerson').value = '';
            document.getElementById('reviewDeadline').value = '';
            document.getElementById('reviewStatus').value = '待开始';
        }

        function saveDraft() {
            if (!currentJob) {
                showToast('请先选择一条作业记录', 'error');
                return;
            }
            var draft = {
                jobId: currentJob.id,
                problems: document.getElementById('reviewProblems').value,
                measures: document.getElementById('reviewMeasures').value,
                summary: document.getElementById('reviewSummary').value,
                person: document.getElementById('reviewPerson').value,
                deadline: document.getElementById('reviewDeadline').value,
                status: document.getElementById('reviewStatus').value
            };
            localStorage.setItem('review_draft_' + currentJob.id, JSON.stringify(draft));
            showToast('草稿保存成功', 'success');
        }

                '<div class="report-info-grid">' +
                '<div class="report-info-item"><span class="report-info-label">作业名称：</span><span class="report-info-value">' + currentJob.name + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">作业地点：</span><span class="report-info-value">' + currentJob.location + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">作业时间：</span><span class="report-info-value">' + currentJob.date + ' ' + currentJob.startTime + '-' + currentJob.endTime + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">作业时长：</span><span class="report-info-value">' + currentJob.duration + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">作业人员：</span><span class="report-info-value">' + currentJob.workers + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">负责人：</span><span class="report-info-value">' + currentJob.manager + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">预警次数：</span><span class="report-info-value" style="color: ' + alertColor + ';">' + currentJob.alertCount + '次</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">作业状态：</span><span class="report-info-value">' + currentJob.status + '</span></div>' +
                '</div>' +

                '<div class="report-section-title">二、作业内容与风险</div>' +
                '<div class="report-info-item" style="margin-bottom: 8px;"><span class="report-info-label">作业内容：</span><span class="report-info-value">' + currentJob.description + '</span></div>' +
                '<div class="report-info-item" style="margin-bottom: 8px;"><span class="report-info-label">主要风险：</span><span class="report-info-value">' + currentJob.risks + '</span></div>' +

                '</div>' +
                '<div class="report-section">' +
                '<div class="report-section-title">三、复盘内容</div>' +
                '<div style="margin-bottom: 12px;"><span class="report-info-label" style="display: block; margin-bottom: 4px;">问题记录：</span><div class="report-text-content">' + problems + '</div></div>' +
                '<div style="margin-bottom: 12px;"><span class="report-info-label" style="display: block; margin-bottom: 4px;">整改措施：</span><div class="report-text-content">' + measures + '</div></div>' +
                '<div style="margin-bottom: 12px;"><span class="report-info-label" style="display: block; margin-bottom: 4px;">经验总结：</span><div class="report-text-content">' + summary + '</div></div>' +
                '<div class="report-info-grid">' +
                '<div class="report-info-item"><span class="report-info-label">责任人：</span><span class="report-info-value">' + person + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">完成时间：</span><span class="report-info-value">' + deadline + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">整改状态：</span><span class="report-info-value">' + status + '</span></div>' +
                '<div class="report-info-item"><span class="report-info-label">生成时间：</span><span class="report-info-value">' + new Date().toLocaleString('zh-CN') + '</span></div>' +
                '</div>' +
                '</div>';
            
            document.getElementById('reportContent').innerHTML = reportHtml;
            document.getElementById('reportModal').style.display = 'flex';
        }

        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
        }

        function uploadReport() {
            showToast('报告上传成功', 'success');
        }

        function printReport() {
            showToast('正在准备打印...', 'info');
            window.print();
        }

        function showToast(message, type) {
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            toast.style.cssText = 'position: fixed; top: 70px; right: 20px; padding: 12px 20px; border-radius: 6px; color: white; font-size: 13px; z-index: 3000;';
            
            if (type === 'success') {
                toast.style.backgroundColor = 'var(--success-color)';
            } else if (type === 'error') {
                toast.style.backgroundColor = 'var(--danger-color)';
            } else {
                toast.style.backgroundColor = 'var(--primary-color)';
            }
            
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.style.display = 'none';
            }
        });
    </script>
