<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台账管理 - 有限空间作业安全风险动态管控平台</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .ledger-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }
        .filter-card {
            background-color: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-label {
            font-size: 12px;
            color: var(--text-light);
        }
        .table-card {
            background-color: white;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .table-info {
            font-size: 13px;
            color: var(--text-light);
        }
        .table-info strong {
            color: var(--primary-color);
        }
        .table-scroll-container {
            flex: 1;
            overflow-y: auto;
        }
        .table-scroll-container::-webkit-scrollbar {
            width: 6px;
        }
        .table-scroll-container::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 3px;
        }
        .table-scroll-container::-webkit-scrollbar-track {
            background-color: #f5f5f5;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table thead {
            position: sticky;
            top: 0;
            background-color: #f8f9fa;
            z-index: 10;
        }
        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }
        .data-table td {
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-color);
            border-bottom: 1px solid var(--border-color);
        }
        .data-table tbody tr:hover {
            background-color: #f8f9fa;
        }
        .expiry-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .expiry-indicator.normal {
            background-color: rgba(56, 161, 105, 0.1);
            color: var(--success-color);
        }
        .expiry-indicator.warning {
            background-color: rgba(237, 137, 54, 0.1);
            color: var(--warning-color);
        }
        .expiry-indicator.danger {
            background-color: rgba(229, 62, 62, 0.1);
            color: var(--danger-color);
        }
        .expiry-indicator svg {
            width: 12px;
            height: 12px;
        }
        .action-btns {
            display: flex;
            gap: 6px;
        }
        .action-btn {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .action-btn.view {
            background-color: rgba(49, 130, 206, 0.1);
            color: var(--info-color);
        }
        .action-btn.edit {
            background-color: rgba(26, 54, 93, 0.1);
            color: var(--primary-color);
        }
        .action-btn.delete {
            background-color: rgba(229, 62, 62, 0.1);
            color: var(--danger-color);
        }
        .action-btn:hover {
            opacity: 0.8;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1500;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-container {
            background-color: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .modal-container.large {
            max-width: 700px;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .modal-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .modal-close:hover {
            background-color: #f5f5f5;
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-shrink: 0;
        }
        .modal-form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        .modal-form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .modal-form-group.full {
            grid-column: span 2;
        }
        .modal-form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-color);
        }
        .modal-form-label .required {
            color: var(--danger-color);
        }
        .modal-section {
            margin-bottom: 20px;
        }
        .modal-section:last-child {
            margin-bottom: 0;
        }
        .modal-section-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .modal-detail-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .modal-detail-label {
            color: var(--text-light);
            min-width: 100px;
        }
        .modal-detail-value {
            color: var(--text-color);
        }
        .confirm-modal {
            text-align: center;
            padding: 20px 0;
        }
        .confirm-modal-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .confirm-modal-icon.danger {
            background-color: rgba(229, 62, 62, 0.1);
        }
        .confirm-modal-icon.danger svg {
            width: 32px;
            height: 32px;
            stroke: var(--danger-color);
        }
        .confirm-modal-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 8px;
        }
        .confirm-modal-message {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 24px;
        }
        .confirm-modal-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-light);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            stroke: #ccc;
            margin-bottom: 12px;
        }
        .empty-state span {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-left">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <h1 class="platform-title">有限空间作业安全风险动态管控平台</h1>

            <div class="realtime-alert">
                <span class="alert-pulse"></span>

            <div class="current-time" id="currentTime"></div>
        </div>
        <div class="user-section">
            <div class="role-switch">
                <select id="roleSelector" class="role-select">

                    <option value="operator">作业人员</option>

    <div class="container" style="margin-top: 56px;">

                    <a href="../index.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <main class="main-content" style="margin-right: 0;">
            <div class="page-header">
                <h2 class="page-title">有限空间管理台账</h2>
                <div class="page-actions">
                    <button class="btn primary" onclick="showAddModal()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        新增台账
                    </button>
                </div>
            </div>

            <div class="ledger-container">
                <div class="filter-card">
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label class="filter-label">空间名称</label>
                            <input type="text" class="form-input" id="filterName" placeholder="请输入空间名称" style="width: 160px;">
                        </div>
                        <div class="filter-item">
                            <label class="filter-label">空间类型</label>
                            <select class="form-select" id="filterType" style="width: 140px;">
                                <option value="">全部</option>
                                <option value="储罐">储罐</option>
                                <option value="管道">管道</option>
                                <option value="地下室">地下室</option>
                                <option value="窨井">窨井</option>
                                <option value="反应釜">反应釜</option>
                                <option value="污水池">污水池</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label class="filter-label">状态</label>
                            <select class="form-select" id="filterStatus" style="width: 120px;">
                                <option value="">全部</option>
                                <option value="正常">正常</option>
                                <option value="即将到期">即将到期</option>
                                <option value="已到期">已到期</option>
                            </select>
                        </div>
                        <div class="filter-item" style="flex-direction: row; gap: 8px;">
                            <button class="btn primary" onclick="doSearch()">查询</button>
                            <button class="btn secondary" onclick="resetSearch()">重置</button>
                        </div>
                    </div>
                </div>

                <div class="table-card">
                    <div class="table-toolbar">
                        <span class="table-info">共 <strong id="totalCount">0</strong> 条记录</span>
                        <div class="table-actions">
                            <button class="btn danger" onclick="batchDelete()">批量删除</button>
                        </div>
                    </div>
                    <div class="table-scroll-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                                    <th style="width: 80px;">状态</th>
                                    <th>空间名称</th>
                                    <th>空间类型</th>
                                    <th>位置</th>
                                    <th>容积(m³)</th>
                                    <th>检测周期</th>
                                    <th>上次检测</th>
                                    <th>下次检测</th>
                                    <th style="width: 150px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-container large">
            <div class="modal-header">
                <h3 class="modal-title" id="formModalTitle">新增台账</h3>
                <button class="modal-close" onclick="closeFormModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form class="modal-form" id="ledgerForm">
                    <div class="modal-form-row">
                        <div class="modal-form-group">
                            <label class="modal-form-label">空间名称 <span class="required">*</span></label>
                            <input type="text" class="form-input" id="spaceName" placeholder="请输入空间名称">
                        </div>
                        <div class="modal-form-group">
                            <label class="modal-form-label">空间类型 <span class="required">*</span></label>
                            <select class="form-select" id="spaceType">
                                <option value="">请选择</option>
                                <option value="储罐">储罐</option>
                                <option value="管道">管道</option>
                                <option value="地下室">地下室</option>
                                <option value="窨井">窨井</option>
                                <option value="反应釜">反应釜</option>
                                <option value="污水池">污水池</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-form-row">
                        <div class="modal-form-group">
                            <label class="modal-form-label">所在位置 <span class="required">*</span></label>
                            <input type="text" class="form-input" id="spaceLocation" placeholder="请输入所在位置">
                        </div>
                        <div class="modal-form-group">
                            <label class="modal-form-label">容积(m³) <span class="required">*</span></label>
                            <input type="number" class="form-input" id="spaceVolume" placeholder="请输入容积">
                        </div>
                    </div>
                    <div class="modal-form-row">
                        <div class="modal-form-group">
                            <label class="modal-form-label">检测周期</label>
                            <select class="form-select" id="checkCycle">
                                <option value="30">30天</option>
                                <option value="60">60天</option>
                                <option value="90">90天</option>
                                <option value="180">180天</option>
                                <option value="365">365天</option>
                            </select>
                        </div>
                        <div class="modal-form-group">
                            <label class="modal-form-label">上次检测日期</label>
                            <input type="date" class="form-input" id="lastCheckDate">
                        </div>
                    </div>
                    <div class="modal-form-row">
                        <div class="modal-form-group">
                            <label class="modal-form-label">下次检测日期</label>
                            <input type="date" class="form-input" id="nextCheckDate">
                        </div>
                        <div class="modal-form-group">
                            <label class="modal-form-label">负责人</label>
                            <input type="text" class="form-input" id="responsible" placeholder="请输入负责人">
                        </div>
                    </div>
                    <div class="modal-form-group full">
                        <label class="modal-form-label">空间描述</label>
                        <textarea class="form-textarea" id="spaceDesc" rows="3" placeholder="请输入空间描述信息"></textarea>
                    </div>
                    <div class="modal-form-group full">
                        <label class="modal-form-label">主要风险</label>
                        <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px;">
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" name="risks" value="缺氧窒息"> 缺氧窒息
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" name="risks" value="有毒有害气体"> 有毒有害气体
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" name="risks" value="易燃易爆"> 易燃易爆
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" name="risks" value="触电伤害"> 触电伤害
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" name="risks" value="淹溺"> 淹溺
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn secondary" onclick="closeFormModal()">取消</button>
                <button class="btn primary" onclick="saveForm()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-container large">
            <div class="modal-header">
                <h3 class="modal-title">台账详情（只读）</h3>
                <button class="modal-close" onclick="closeViewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form class="modal-form" id="viewForm">
                    <div class="modal-form-row">
                        <div class="modal-form-group">
                            <label class="modal-form-label">空间名称</label>
                            <input type="text" class="form-input" id="viewSpaceName" readonly style="background-color: #f5f5f5;">
                        </div>
                        <div class="modal-form-group">
                            <label class="modal-form-label">空间类型</label>
                            <input type="text" class="form-input" id="viewSpaceType" readonly style="background-color: #f5f5f5;">
                        </div>
                    </div>
                    <div class="modal-form-row">
                        <div class="modal-form-group">
                            <label class="modal-form-label">所在位置</label>
                            <input type="text" class="form-input" id="viewSpaceLocation" readonly style="background-color: #f5f5f5;">
                        </div>
                        <div class="modal-form-group">

    <div id="toast" style="display: none; position: fixed; top: 80px; right: 20px; padding: 12px 20px; background-color: var(--success-color); color: white; border-radius: 6px; box-shadow: var(--shadow-lg); z-index: 3000;">

            { id: 16, name: '3号地下室', type: '地下室', location: '生产区', volume: 250, cycle: 90, lastCheck: '2023-12-20', nextCheck: '2024-03-20', status: '正常', responsible: '王五', risks: ['缺氧窒息', '触电伤害'] },
            { id: 17, name: '1号窨井', type: '窨井', location: '厂区道路A', volume: 10, cycle: 30, lastCheck: '2024-01-08', nextCheck: '2024-02-07', status: '正常', responsible: '赵六', risks: ['缺氧窒息', '有毒有害气体'] },
            { id: 18, name: '2号窨井', type: '窨井', location: '厂区道路A', volume: 12, cycle: 30, lastCheck: '2023-12-18', nextCheck: '2024-01-17', status: '已到期', responsible: '赵六', risks: ['缺氧窒息', '有毒有害气体', '淹溺'] },
            { id: 19, name: '3号窨井', type: '窨井', location: '厂区道路B', volume: 15, cycle: 30, lastCheck: '2024-01-12', nextCheck: '2024-02-11', status: '正常', responsible: '张三', risks: ['缺氧窒息'] },
            { id: 20, name: '4号窨井', type: '窨井', location: '厂区道路B', volume: 8, cycle: 30, lastCheck: '2023-12-28', nextCheck: '2024-01-27', status: '即将到期', responsible: '李四', risks: ['有毒有害气体'] },
            { id: 21, name: '5号窨井', type: '窨井', location: '厂区道路C', volume: 20, cycle: 30, lastCheck: '2024-01-10', nextCheck: '2024-02-09', status: '正常', responsible: '王五', risks: ['缺氧窒息', '淹溺'] },
            { id: 22, name: '1号污水池', type: '污水池', location: '污水处理区', volume: 400, cycle: 60, lastCheck: '2024-01-06', nextCheck: '2024-03-06', status: '正常', responsible: '张三', risks: ['缺氧窒息', '有毒有害气体', '淹溺'] },
            { id: 23, name: '2号污水池', type: '污水池', location: '污水处理区', volume: 350, cycle: 60, lastCheck: '2023-11-25', nextCheck: '2024-01-24', status: '即将到期', responsible: '李四', risks: ['缺氧窒息', '有毒有害气体', '淹溺'] },
            { id: 24, name: '6号储罐', type: '储罐', location: '储罐区C', volume: 600, cycle: 30, lastCheck: '2024-01-11', nextCheck: '2024-02-10', status: '正常', responsible: '王五', risks: ['缺氧窒息', '易燃易爆'] }
        ];

        var filteredData = [];
        var currentEditId = null;
        var currentViewId = null;
        var currentDeleteIds = [];
        var nextId = 25;

        document.addEventListener('DOMContentLoaded', function() {
            filteredData = allLedgerData.slice();
            renderTable();
        });

        function renderTable() {
            var tbody = document.getElementById('dataTableBody');
            var countEl = document.getElementById('totalCount');
            
            countEl.textContent = filteredData.length;
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                    '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
                    '<polyline points="14 2 14 8 20 8"/>' +
                    '</svg>' +
                    '<span>暂无数据</span>' +
                    '</div></td></tr>';
                return;
            }

            var html = '';
            for (var i = 0; i < filteredData.length; i++) {
                var item = filteredData[i];
                var statusClass = item.status === '正常' ? 'normal' : (item.status === '即将到期' ? 'warning' : 'danger');
                var nextCheckColor = item.status === '已到期' ? 'var(--danger-color)' : (item.status === '即将到期' ? 'var(--warning-color)' : 'inherit');
                
                html += '<tr data-id="' + item.id + '">' +
                    '<td><input type="checkbox" class="row-checkbox" data-id="' + item.id + '"></td>' +
                    '<td><span class="expiry-indicator ' + statusClass + '">' +
                    getStatusIcon(item.status) + item.status + '</span></td>' +
                    '<td>' + item.name + '</td>' +
                    '<td>' + item.type + '</td>' +
                    '<td>' + item.location + '</td>' +
                    '<td>' + item.volume + '</td>' +
                    '<td>' + item.cycle + '天</td>' +
                    '<td>' + item.lastCheck + '</td>' +
                    '<td style="color: ' + nextCheckColor + ';">' + item.nextCheck + '</td>' +
                    '<td><div class="action-btns">' +
                    '<button class="action-btn view" onclick="showViewModal(' + item.id + ')">查看</button>' +
                    '<button class="action-btn edit" onclick="showEditModal(' + item.id + ')">编辑</button>' +
                    '<button class="action-btn delete" onclick="showDeleteConfirm(' + item.id + ')">删除</button>' +
                    '</div></td></tr>';
            }
            tbody.innerHTML = html;
        }

        function getStatusIcon(status) {
            if (status === '正常') {
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
            } else if (status === '即将到期') {
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
            } else {
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
            }
        }

        function doSearch() {
            var name = document.getElementById('filterName').value.toLowerCase();
            var type = document.getElementById('filterType').value;
            var status = document.getElementById('filterStatus').value;

            filteredData = allLedgerData.filter(function(item) {
                var nameMatch = !name || item.name.toLowerCase().indexOf(name) !== -1;
                var typeMatch = !type || item.type === type;
                var statusMatch = !status || item.status === status;
                return nameMatch && typeMatch && statusMatch;
            });

            renderTable();
            showToast('查询完成，共找到 ' + filteredData.length + ' 条记录');
        }

        function resetSearch() {
            document.getElementById('filterName').value = '';
            document.getElementById('filterType').value = '';
            document.getElementById('filterStatus').value = '';
            filteredData = allLedgerData.slice();
            renderTable();
            showToast('已重置筛选条件');
        }

        function toggleSelectAll() {
            var selectAll = document.getElementById('selectAll');
            var checkboxes = document.querySelectorAll('.row-checkbox');
            for (var i = 0; i < checkboxes.length; i++) {
                checkboxes[i].checked = selectAll.checked;
            }
        }

        function batchDelete() {
            var checkboxes = document.querySelectorAll('.row-checkbox:checked');
            if (checkboxes.length === 0) {
                showToast('请先选择要删除的记录', 'error');
                return;
            }
            
            currentDeleteIds = [];
            for (var i = 0; i < checkboxes.length; i++) {
                currentDeleteIds.push(parseInt(checkboxes[i].getAttribute('data-id')));
            }
            
            document.getElementById('deleteMessage').textContent = '确定要删除选中的 ' + currentDeleteIds.length + ' 条记录吗？此操作不可恢复。';
            document.getElementById('deleteModal').classList.add('show');
        }

        function showAddModal() {
            currentEditId = null;
            document.getElementById('formModalTitle').textContent = '新增台账';
            document.getElementById('ledgerForm').reset();
            var riskCheckboxes = document.querySelectorAll('input[name="risks"]');
            for (var i = 0; i < riskCheckboxes.length; i++) {
                riskCheckboxes[i].checked = false;
            }
            document.getElementById('formModal').classList.add('show');
        }

        function showEditModal(id) {
            currentEditId = id;
            var item = null;
            for (var i = 0; i < allLedgerData.length; i++) {
                if (allLedgerData[i].id === id) {
                    item = allLedgerData[i];
                    break;
                }
            }
            
            if (!item) return;
            
            document.getElementById('formModalTitle').textContent = '编辑台账';
            document.getElementById('spaceName').value = item.name;
            document.getElementById('spaceType').value = item.type;
            document.getElementById('spaceLocation').value = item.location;
            document.getElementById('spaceVolume').value = item.volume;
            document.getElementById('checkCycle').value = item.cycle;
            document.getElementById('lastCheckDate').value = item.lastCheck;
            document.getElementById('nextCheckDate').value = item.nextCheck;
            document.getElementById('responsible').value = item.responsible || '';
            
            var riskCheckboxes = document.querySelectorAll('input[name="risks"]');
            for (var i = 0; i < riskCheckboxes.length; i++) {
                riskCheckboxes[i].checked = item.risks && item.risks.indexOf(riskCheckboxes[i].value) !== -1;
            }
            
            document.getElementById('formModal').classList.add('show');
        }

        function closeFormModal() {
            document.getElementById('formModal').classList.remove('show');
        }

        function saveForm() {
            var name = document.getElementById('spaceName').value;
            var type = document.getElementById('spaceType').value;
            var location = document.getElementById('spaceLocation').value;
            var volume = document.getElementById('spaceVolume').value;

            if (!name || !type || !location || !volume) {
                showToast('请填写必填项', 'error');
                return;
            }

            var risks = [];
            var riskCheckboxes = document.querySelectorAll('input[name="risks"]:checked');
            for (var i = 0; i < riskCheckboxes.length; i++) {
                risks.push(riskCheckboxes[i].value);
            }

            var nextCheck = document.getElementById('nextCheckDate').value;
            var today = new Date().toISOString().split('T')[0];
            var status = '正常';
            
            if (nextCheck) {
                var nextDate = new Date(nextCheck);
                var todayDate = new Date(today);
                var diffDays = Math.ceil((nextDate - todayDate) / (1000 * 60 * 60 * 24));
                
                if (diffDays < 0) {
                    status = '已到期';
                } else if (diffDays <= 7) {
                    status = '即将到期';
                }
            }

            if (currentEditId) {
                for (var i = 0; i < allLedgerData.length; i++) {
                    if (allLedgerData[i].id === currentEditId) {
                        allLedgerData[i].name = name;
                        allLedgerData[i].type = type;
                        allLedgerData[i].location = location;
                        allLedgerData[i].volume = parseInt(volume);
                        allLedgerData[i].cycle = parseInt(document.getElementById('checkCycle').value);
                        allLedgerData[i].lastCheck = document.getElementById('lastCheckDate').value;
                        allLedgerData[i].nextCheck = nextCheck;
                        allLedgerData[i].responsible = document.getElementById('responsible').value;
                        allLedgerData[i].risks = risks;
                        allLedgerData[i].status = status;
                        break;
                    }
                }
                showToast('编辑成功');
            } else {
                var newItem = {
                    id: nextId++,
                    name: name,
                    type: type,
                    location: location,
                    volume: parseInt(volume),
                    cycle: parseInt(document.getElementById('checkCycle').value),
                    lastCheck: document.getElementById('lastCheckDate').value,
                    nextCheck: nextCheck,
                    responsible: document.getElementById('responsible').value,
                    risks: risks,
                    status: status
                };
                allLedgerData.unshift(newItem);
                showToast('新增成功');
            }

            filteredData = allLedgerData.slice();
            renderTable();
            closeFormModal();
        }

        function showViewModal(id) {
            var item = null;
            for (var i = 0; i < allLedgerData.length; i++) {
                if (allLedgerData[i].id === id) {
                    item = allLedgerData[i];
                    break;
                }
            }
            
            if (!item) return;
            
            currentViewId = id;
            document.getElementById('viewSpaceName').value = item.name;
            document.getElementById('viewSpaceType').value = item.type;
            document.getElementById('viewSpaceLocation').value = item.location;
            document.getElementById('viewSpaceVolume').value = item.volume;
            document.getElementById('viewCheckCycle').value = item.cycle + '天';
            document.getElementById('viewLastCheckDate').value = item.lastCheck || '-';
            document.getElementById('viewNextCheckDate').value = item.nextCheck || '-';
            document.getElementById('viewStatus').value = item.status;
            document.getElementById('viewResponsible').value = item.responsible || '-';
            document.getElementById('viewRisks').value = item.risks ? item.risks.join('、') : '-';
            document.getElementById('viewModal').classList.add('show');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('show');
        }

        function editFromView() {
            if (currentViewId) {
                closeViewModal();
                showEditModal(currentViewId);
            }
        }

        function showDeleteConfirm(id) {
            currentDeleteIds = [id];
            var item = null;
            for (var i = 0; i < allLedgerData.length; i++) {
                if (allLedgerData[i].id === id) {
                    item = allLedgerData[i];
                    break;
                }
            }
            document.getElementById('deleteMessage').textContent = '确定要删除"' + (item ? item.name : '') + '"的台账记录吗？此操作不可恢复。';
            document.getElementById('deleteModal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            currentDeleteIds = [];
        }

        function confirmDelete() {
            for (var i = allLedgerData.length - 1; i >= 0; i--) {
                for (var j = 0; j < currentDeleteIds.length; j++) {
                    if (allLedgerData[i].id === currentDeleteIds[j]) {
                        allLedgerData.splice(i, 1);
                        break;
                    }
                }
            }
            
            filteredData = allLedgerData.slice();
            renderTable();
            closeDeleteModal();
            showToast('删除成功，共删除 ' + currentDeleteIds.length + ' 条记录');
        }

        function showToast(message, type) {
            var toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            
            if (type === 'error') {
                toast.style.backgroundColor = 'var(--danger-color)';
            } else {
                toast.style.backgroundColor = 'var(--success-color)';
            }
            
            toast.style.display = 'block';
            setTimeout(function() {
                toast.style.display = 'none';
            }, 2000);
        }

        document.querySelectorAll('.modal-overlay').forEach(function(modal) {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                }
            });
        });
    </script>
